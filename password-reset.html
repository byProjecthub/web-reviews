<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Reset</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:420px;
    background:white;
    padding:45px 40px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* Headings */

h2{
    font-weight:600;
    margin-bottom:6px;
}

.subtitle{
    font-size:13px;
    color:#888;
    margin-bottom:25px;
}

/* Inputs */

.field{
    margin-bottom:15px;
    position:relative;
}

.field label{
    font-size:13px;
    display:block;
    margin-bottom:5px;
}

.field input{
    width:100%;
    padding:12px;
    border-radius:6px;
    border:1px solid #ddd;
}

/* Password Toggle */

.toggle-password{
    position:absolute;
    right:12px;
    top:38px;
    cursor:pointer;
    color:#888;
}

/* Buttons */

.save-btn{
    width:100%;
    padding:13px;
    border:none;
    background:#4b5cff;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-weight:500;
    margin-top:10px;
}

.back-link{
    display:block;
    text-align:center;
    margin-top:20px;
    font-size:13px;
}

.back-link a{
    text-decoration:none;
    color:#4b5cff;
}

small{
    font-size:11px;
    color:#888;
}

</style>
</head>

<body>

<div class="container">

<form method="POST" action="">

    <h2>Password Change</h2>
    <p class="subtitle">Choose a new password for your account</p>

    <!-- New Password -->
    <div class="field">
        <label>New Password</label>
        <input type="password" id="new_password" placeholder="Create Password" name="new_password" required>
        <i class="fa-solid fa-eye toggle-password"
           onclick="togglePassword('new_password', this)"></i>
    </div>

    <!-- Confirm Password -->
    <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirm_password" placeholder="Re-enter Password" name="confirm_password" required>
        <i class="fa-solid fa-eye toggle-password"
           onclick="togglePassword('confirm_password', this)"></i>
        <small>Passwords must match</small>
    </div>

    <button type="submit" class="save-btn">
        Reset Password
    </button>

</form>

<div class="back-link">
    <a href="login.html">Back to Login</a>
</div>

</div>

<script>
function togglePassword(fieldId, icon){
    const field = document.getElementById(fieldId);

    if(field.type === "password"){
        field.type = "text";
        icon.classList.replace("fa-eye","fa-eye-slash");
    } else {
        field.type = "password";
        icon.classList.replace("fa-eye-slash","fa-eye");
    }
}
</script>

</body>
</html>
