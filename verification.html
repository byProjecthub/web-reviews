<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link ref="stylesheet" href="css/css.css"/>

</head>

<body>

<div class="container">

<form method="POST" action="password-reset.html">

    <h2>Enter OTP</h2>
    <p class="subtitle">Check your email for your verification code</p>

    <p class="timer-text">
        You can resend OTP after 60 seconds
    </p>

    <div class="timer-bar">
        <div class="timer-progress"></div>
    </div>

    <div class="field">
        <label>OTP Code</label>
        <input type="number" placeholder="Enter OTP" name="otp" required>
    </div>

    <button type="submit" class="save-btn">
        Verify OTP
    </button>

</form>

<form method="POST" action="resend_otp.php">
    <button type="submit" class="resend-btn">
        Resend OTP
    </button>
</form>

<div class="back-link">
    <a href="login.html">Back to Login</a>
</div>

</div>

</body>
</html>
