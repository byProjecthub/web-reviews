<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>


<link rel="stylesheet" href="css1.css">
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:420px;
    background:white;
    padding:45px 40px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* Header */

h2{
    font-weight:600;
    margin-bottom:6px;
}

.subtitle{
    font-size:13px;
    color:#888;
    margin-bottom:25px;
}

/* Inputs */

.field{
    margin-bottom:15px;
}

.field label{
    font-size:13px;
    display:block;
    margin-bottom:5px;
}

.field input{
    width:100%;
    padding:12px;
    border-radius:6px;
    border:1px solid #ddd;
}

/* Buttons */

.save-btn{
    width:100%;
    padding:13px;
    border:none;
    background:#4b5cff;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-weight:500;
    margin-top:10px;
}

.resend-btn{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    background:white;
    border-radius:6px;
    cursor:pointer;
    margin-top:10px;
}

.back-link{
    display:block;
    text-align:center;
    margin-top:20px;
    font-size:13px;
}

.back-link a{
    text-decoration:none;
    color:#4b5cff;
}

/* OTP Section */

#otp-section{
    display:none;
    margin-top:25px;
}

.timer-text{
    font-size:12px;
    color:#999;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<!-- Forgot Password Form -->
<form method="POST" action="" id="email-form">

    <h2>Forgot Password</h2>
    <p class="subtitle">Enter your email to receive OTP code</p>

    <div class="field">
        <label>Email Address</label>
        <input type="email" placeholder="Enter your email" name="email" required>
    </div>

    <button type="button" class="save-btn" onclick="showOTP()">
        Send OTP
    </button>

</form>


<!-- OTP FORM -->
<form method="POST" action="" id="otp-section">

    <h2>Enter OTP</h2>
    <p class="subtitle">Check your email for verification code</p>

    <p class="timer-text">You can resend OTP after 60 seconds</p>

    <div class="field">
        <label>OTP Code</label>
        <input type="number" name="otp" required>
    </div>

    <button type="submit" class="save-btn">
        Verify OTP
    </button>

    <button type="submit" class="resend-btn">
        Resend OTP
    </button>

</form>

<div class="back-link">
    <a href="login.html">Back to Login</a>
</div>

</div>


<script>
function showOTP(){
    document.getElementById("otp-section").style.display = "block";
}
</script>

</body>
</html>
